name: Keep Alive - Ping Website

on:
  schedule:
    # Ping every 5 minutes to prevent Render free tier from sleeping
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Website
        run: |
          echo "Pinging First Class Perfume website..."
          curl -s -o /dev/null -w "Status: %{http_code} | Time: %{time_total}s" https://first-class-perfume-1.onrender.com/ || true
          echo ""
          echo "Ping completed at $(date -u)"
